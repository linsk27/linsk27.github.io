<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Local AI Ops console preview</title>
  <desc id="desc">A clean dashboard style cover for Local AI Ops showing resources, checks, alerts and AI diagnosis.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="54%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#172033"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect x="50" y="48" width="1100" height="579" rx="28" fill="#0b1220" stroke="#22304a"/>
  <rect x="82" y="82" width="220" height="511" rx="20" fill="#101827" stroke="#263248"/>
  <text x="112" y="126" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Local AI Ops</text>
  <text x="112" y="156" fill="#94a3b8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">LAN cloud operations console</text>
  <g fill="#1e293b">
    <rect x="112" y="205" width="160" height="38" rx="10"/>
    <rect x="112" y="259" width="160" height="38" rx="10"/>
    <rect x="112" y="313" width="160" height="38" rx="10"/>
    <rect x="112" y="367" width="160" height="38" rx="10"/>
  </g>
  <g fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">
    <text x="132" y="230">Assets</text>
    <text x="132" y="284">Checks</text>
    <text x="132" y="338">Alerts</text>
    <text x="132" y="392">AI Diagnosis</text>
  </g>
  <rect x="336" y="82" width="782" height="90" rx="20" fill="#101827" stroke="#263248"/>
  <text x="366" y="125" fill="#e5e7eb" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Alibaba Cloud resources, local checks and AI diagnosis in one place</text>
  <text x="366" y="151" fill="#94a3b8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">FastAPI · React · PostgreSQL · Redis · Celery · OpenAPI</text>
  <g filter="url(#shadow)">
    <rect x="336" y="205" width="238" height="148" rx="20" fill="url(#card)" stroke="#2f3c56"/>
    <rect x="606" y="205" width="238" height="148" rx="20" fill="url(#card)" stroke="#2f3c56"/>
    <rect x="876" y="205" width="242" height="148" rx="20" fill="url(#card)" stroke="#2f3c56"/>
    <rect x="336" y="385" width="375" height="152" rx="20" fill="url(#card)" stroke="#2f3c56"/>
    <rect x="743" y="385" width="375" height="152" rx="20" fill="url(#card)" stroke="#2f3c56"/>
  </g>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="366" y="246" fill="#38bdf8" font-size="16" font-weight="700">Cloud Assets</text>
    <text x="366" y="286" fill="#f8fafc" font-size="34" font-weight="700">ECS · OSS · DNS</text>
    <text x="366" y="319" fill="#94a3b8" font-size="15">Synced from Alibaba Cloud OpenAPI</text>
    <text x="636" y="246" fill="#34d399" font-size="16" font-weight="700">Health Checks</text>
    <text x="636" y="286" fill="#f8fafc" font-size="34" font-weight="700">HTTP · TCP · SSH</text>
    <text x="636" y="319" fill="#94a3b8" font-size="15">Manual and scheduled diagnostics</text>
    <text x="906" y="246" fill="#f59e0b" font-size="16" font-weight="700">Alert Loop</text>
    <text x="906" y="286" fill="#f8fafc" font-size="34" font-weight="700">Confirm · Close</text>
    <text x="906" y="319" fill="#94a3b8" font-size="15">Track failures and recovery state</text>
    <text x="366" y="426" fill="#a78bfa" font-size="16" font-weight="700">AI Diagnosis</text>
    <text x="366" y="466" fill="#f8fafc" font-size="30" font-weight="700">Readable steps, likely causes, commands</text>
    <text x="366" y="499" fill="#94a3b8" font-size="15">OpenAI-compatible API, no automatic repair execution</text>
    <text x="773" y="426" fill="#60a5fa" font-size="16" font-weight="700">Local First</text>
    <text x="773" y="466" fill="#f8fafc" font-size="30" font-weight="700">Encrypted secrets, LAN deployment</text>
    <text x="773" y="499" fill="#94a3b8" font-size="15">PostgreSQL and Redis stay inside Docker network</text>
  </g>
  <g stroke="#38bdf8" stroke-width="2" opacity="0.4">
    <path d="M574 279 C590 279,590 279,606 279"/>
    <path d="M844 279 C860 279,860 279,876 279"/>
    <path d="M726 353 C726 372,726 372,726 385"/>
  </g>
</svg>
