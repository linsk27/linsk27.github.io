<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Local AI Ops simulated console screenshot</title>
  <desc id="desc">A simulated Local AI Ops dashboard screenshot using mock data only.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="55%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111c2f"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
    <style>
      .ui { font-family: Inter, "Segoe UI", "Microsoft YaHei", Arial, sans-serif; }
      .muted { fill: #94a3b8; }
      .subtle { fill: #64748b; }
      .text { fill: #e5e7eb; }
      .strong { fill: #f8fafc; font-weight: 700; }
      .line { stroke: #263448; stroke-width: 1; }
      .panel { fill: url(#panel); stroke: #263448; }
      .chip { fill: #172033; stroke: #29364b; }
      .good { fill: #34d399; }
      .warn { fill: #f59e0b; }
      .bad { fill: #fb7185; }
      .blue { fill: #60a5fa; }
      .cyan { fill: #22d3ee; }
    </style>
  </defs>

  <rect width="1440" height="900" fill="url(#page)"/>
  <rect x="34" y="34" width="1372" height="832" rx="30" fill="#08111f" stroke="#1e293b" filter="url(#softShadow)"/>

  <rect x="58" y="58" width="250" height="784" rx="24" fill="#0d1626" stroke="#243044"/>
  <circle cx="98" cy="100" r="18" fill="url(#cyan)"/>
  <text x="128" y="96" class="ui strong" font-size="22">Local AI Ops</text>
  <text x="128" y="122" class="ui muted" font-size="13">模拟数据 · 不含真实账号</text>

  <g class="ui" font-size="15">
    <rect x="82" y="176" width="198" height="42" rx="12" fill="#172033" stroke="#334155"/>
    <text x="114" y="202" class="text">总览</text>
    <rect x="82" y="232" width="198" height="42" rx="12" fill="#0f172a"/>
    <text x="114" y="258" class="muted">云账号</text>
    <rect x="82" y="288" width="198" height="42" rx="12" fill="#0f172a"/>
    <text x="114" y="314" class="muted">资产</text>
    <rect x="82" y="344" width="198" height="42" rx="12" fill="#0f172a"/>
    <text x="114" y="370" class="muted">监控</text>
    <rect x="82" y="400" width="198" height="42" rx="12" fill="#0f172a"/>
    <text x="114" y="426" class="muted">告警</text>
    <rect x="82" y="456" width="198" height="42" rx="12" fill="#0f172a"/>
    <text x="114" y="482" class="muted">AI 诊断</text>
    <rect x="82" y="512" width="198" height="42" rx="12" fill="#0f172a"/>
    <text x="114" y="538" class="muted">AI 配置</text>
  </g>

  <rect x="84" y="720" width="196" height="80" rx="18" fill="#101827" stroke="#263448"/>
  <text x="108" y="752" class="ui muted" font-size="13">本地 API</text>
  <circle cx="110" cy="778" r="6" class="good"/>
  <text x="128" y="783" class="ui text" font-size="15">已连接</text>

  <rect x="336" y="58" width="1046" height="94" rx="24" fill="#0d1626" stroke="#243044"/>
  <text x="370" y="100" class="ui strong" font-size="28">运维态势</text>
  <text x="370" y="128" class="ui muted" font-size="15">局域网本地控制台 · 阿里云资源同步 · 监控检查 · AI 排查建议</text>
  <rect x="1112" y="85" width="112" height="38" rx="12" fill="#101827" stroke="#334155"/>
  <text x="1135" y="109" class="ui text" font-size="14">刷新数据</text>
  <rect x="1242" y="85" width="106" height="38" rx="12" fill="url(#cyan)"/>
  <text x="1268" y="109" class="ui strong" font-size="14">同步资产</text>

  <g filter="url(#softShadow)">
    <rect x="336" y="184" width="236" height="124" rx="22" class="panel"/>
    <rect x="596" y="184" width="236" height="124" rx="22" class="panel"/>
    <rect x="856" y="184" width="236" height="124" rx="22" class="panel"/>
    <rect x="1116" y="184" width="266" height="124" rx="22" class="panel"/>
  </g>
  <g class="ui">
    <text x="366" y="222" class="muted" font-size="15">资源总数</text>
    <text x="366" y="270" class="strong" font-size="42">24</text>
    <text x="430" y="270" class="subtle" font-size="15">项模拟资产</text>
    <text x="626" y="222" class="muted" font-size="15">开放告警</text>
    <text x="626" y="270" class="strong" font-size="42">3</text>
    <text x="672" y="270" class="warn" font-size="15">需要确认</text>
    <text x="886" y="222" class="muted" font-size="15">监控项</text>
    <text x="886" y="270" class="strong" font-size="42">18</text>
    <text x="948" y="270" class="good" font-size="15">15 个正常</text>
    <text x="1146" y="222" class="muted" font-size="15">网站可用率</text>
    <text x="1146" y="270" class="strong" font-size="42">98.6%</text>
  </g>

  <rect x="336" y="334" width="498" height="242" rx="24" class="panel"/>
  <text x="366" y="376" class="ui strong" font-size="20">资产分布</text>
  <text x="366" y="402" class="ui muted" font-size="14">ECS / OSS / 域名 / DNS，全部为模拟数据</text>
  <circle cx="480" cy="478" r="72" fill="none" stroke="#172033" stroke-width="32"/>
  <path d="M480 406 A72 72 0 0 1 550 494" fill="none" stroke="#22d3ee" stroke-width="32" stroke-linecap="round"/>
  <path d="M550 494 A72 72 0 0 1 430 538" fill="none" stroke="#60a5fa" stroke-width="32" stroke-linecap="round"/>
  <path d="M430 538 A72 72 0 0 1 412 438" fill="none" stroke="#34d399" stroke-width="32" stroke-linecap="round"/>
  <text x="454" y="484" class="ui strong" font-size="28">24</text>
  <text x="444" y="508" class="ui muted" font-size="13">assets</text>
  <g class="ui" font-size="14">
    <circle cx="620" cy="438" r="6" class="cyan"/><text x="638" y="443" class="text">ECS 示例服务器 · 9</text>
    <circle cx="620" cy="474" r="6" class="blue"/><text x="638" y="479" class="text">OSS 示例 bucket · 6</text>
    <circle cx="620" cy="510" r="6" class="good"/><text x="638" y="515" class="text">域名与 DNS · 7</text>
    <circle cx="620" cy="546" r="6" class="warn"/><text x="638" y="551" class="text">轻量应用服务器 · 2</text>
  </g>

  <rect x="862" y="334" width="520" height="242" rx="24" class="panel"/>
  <text x="892" y="376" class="ui strong" font-size="20">最近告警</text>
  <text x="892" y="402" class="ui muted" font-size="14">脱敏目标，仅展示状态流转</text>
  <g class="ui" font-size="14">
    <rect x="892" y="428" width="456" height="42" rx="12" class="chip"/>
    <circle cx="918" cy="449" r="6" class="bad"/><text x="936" y="454" class="text">demo-web-01 · HTTPS 探活连续失败</text><text x="1262" y="454" class="warn">待确认</text>
    <rect x="892" y="484" width="456" height="42" rx="12" class="chip"/>
    <circle cx="918" cy="505" r="6" class="warn"/><text x="936" y="510" class="text">mock-ecs-cn · 磁盘使用率接近阈值</text><text x="1262" y="510" class="blue">已确认</text>
    <rect x="892" y="540" width="456" height="42" rx="12" class="chip"/>
    <circle cx="918" cy="561" r="6" class="good"/><text x="936" y="566" class="text">sample-api · TCP 端口恢复连通</text><text x="1262" y="566" class="good">已恢复</text>
  </g>

  <rect x="336" y="604" width="668" height="214" rx="24" class="panel"/>
  <text x="366" y="646" class="ui strong" font-size="20">云资产</text>
  <text x="366" y="672" class="ui muted" font-size="14">示例列表不包含真实 IP、账号、域名或实例 ID</text>
  <line x1="366" y1="700" x2="966" y2="700" class="line"/>
  <g class="ui" font-size="14">
    <text x="366" y="728" class="muted">名称</text><text x="548" y="728" class="muted">类型</text><text x="660" y="728" class="muted">地域</text><text x="794" y="728" class="muted">状态</text><text x="888" y="728" class="muted">续费</text>
    <text x="366" y="766" class="text">demo-web-01</text><text x="548" y="766" class="text">ECS</text><text x="660" y="766" class="text">cn-hangzhou</text><text x="794" y="766" class="good">running</text><text x="888" y="766" class="warn">30 天内</text>
    <text x="366" y="806" class="text">sample-assets</text><text x="548" y="806" class="text">OSS</text><text x="660" y="806" class="text">cn-shanghai</text><text x="794" y="806" class="good">normal</text><text x="888" y="806" class="muted">不适用</text>
  </g>

  <rect x="1032" y="604" width="350" height="214" rx="24" class="panel"/>
  <text x="1062" y="646" class="ui strong" font-size="20">AI 诊断建议</text>
  <text x="1062" y="674" class="ui muted" font-size="14">只生成建议，不自动修复</text>
  <rect x="1062" y="704" width="286" height="86" rx="16" fill="#101827" stroke="#263448"/>
  <text x="1084" y="734" class="ui text" font-size="14">1. 先确认最近部署与证书变更</text>
  <text x="1084" y="760" class="ui text" font-size="14">2. 检查安全组和目标端口</text>
  <text x="1084" y="786" class="ui text" font-size="14">3. 再执行只读命令采集状态</text>

  <text x="1120" y="850" class="ui subtle" font-size="13">Mock screenshot based on project UI · no real cloud data</text>
</svg>
